services:
  # PostgreSQL Database
  postgres:
    image: postgres
    container_name: carecircle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: carecircle_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    networks:
      - carecircle-network

  # Redis Cache
  redis:
    image: redis
    container_name: carecircle-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - carecircle-network
  # Redis Commander (Redis UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: carecircle-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - carecircle-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  carecircle-network:
    driver: bridge
