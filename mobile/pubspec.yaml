name: carecircle
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  go_router: ^16.0.0
  google_sign_in: ^7.1.0
  sign_in_with_apple: ^7.0.1
  firebase_auth: ^5.3.1
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  form_validator: ^2.1.1
  workmanager: ^0.8.0
  awesome_notifications: ^0.10.1
  image_picker: ^1.1.2
  health: ^13.1.1
  permission_handler: ^12.0.1
  logger: ^2.4.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  flutter_dotenv: ^5.2.1
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.9
  path_provider: ^2.1.5
  path: ^1.9.1
  fl_chart: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
