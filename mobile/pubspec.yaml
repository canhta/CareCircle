name: care_circle
description: "An application for managing care circles, allowing users to create and join circles, share updates, and coordinate care activities."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  firebase_ai: ^2.2.1
  firebase_core: ^3.15.1
  flutter:
    sdk: flutter
  flutter_ai_toolkit: ^0.9.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
