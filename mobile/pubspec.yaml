name: care_circle
description: 'CareCircle mobile app for healthcare management and care coordination'
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  firebase_ai: ^2.2.1
  firebase_core: ^3.15.1
  flutter:
    sdk: flutter
  flutter_ai_toolkit: ^0.9.1
  flutter_dotenv: ^5.2.1
  health: ^11.1.1
  permission_handler: ^11.3.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  workmanager: ^0.6.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
